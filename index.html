<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Pro Motor Fiziği - V2</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        .ui {
            position: absolute; top: 20px; left: 20px; color: #fff;
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px;
            border: 1px solid #444; pointer-events: none;
        }
        .speedometer { font-size: 24px; color: #00ff00; }
    </style>
</head>
<body>

<div class="ui">
    <div class="speedometer">Hız: <span id="speedText">0</span> km/h</div>
    <p>Gaz: ↑ | Fren: ↓ | Denge: ← → | Reset: R</p>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const speedText = document.getElementById('speedText');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- OYUN AYARLARI ---
const physics = {
    gravity: 0.25,
    friction: 0.985,
    groundPoints: []
};

let bike = {
    x: 100, y: 0,
    vX: 0, vY: 0,
    angle: 0, vAngle: 0,
    wheelSize: 18,
    suspension: 15 // Tekerleklerin gövdeden uzaklığı
};

// 1. PROFESYONEL ARAZİ OLUŞTURMA (Tepeler)
function generateTerrain() {
    for (let i = 0; i < 5000; i += 20) {
        // Sinüs dalgaları ile doğal görünümlü tepeler oluşturuyoruz
        let height = Math.sin(i * 0.01) * 40 + Math.sin(i * 0.005) * 80 + (canvas.height - 150);
        physics.groundPoints.push({ x: i, y: height });
    }
}
generateTerrain();

const keys = {};
window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => keys[e.code] = false;

function getGroundHeight(x) {
    // Motorun o anki X konumundaki yerin yüksekliğini bulur
    const point = physics.groundPoints.find(p => p.x >= x);
    return point ? point.y : canvas.height;
}

function update() {
    // Hareket Kontrolü
    if (keys['ArrowUp']) bike.vX += 0.4;
    if (keys['ArrowDown']) bike.vX -= 0.2;
    if (keys['ArrowLeft']) bike.vAngle -= 0.004;
    if (keys['ArrowRight']) bike.vAngle += 0.004;

    bike.vX *= physics.friction;
    bike.vY += physics.gravity;
    bike.vAngle *= 0.9;

    bike.x += bike.vX;
    bike.y += bike.vY;
    bike.angle += bike.vAngle;

    // Zeminle Etkileşim
    let currentGround = getGroundHeight(bike.x);
    if (bike.y + bike.wheelSize + bike.suspension > currentGround) {
        bike.y = currentGround - bike.wheelSize - bike.suspension;
        bike.vY *= -0.2; // Hafif bir zıplama etkisi (Süspansiyon)
        
        // Arazi eğimine göre motoru otomatik hizalamaya çalış (Daha pro hissettirir)
        let nextGround = getGroundHeight(bike.x + 5);
        let slope = Math.atan2(nextGround - currentGround, 5);
        bike.angle += (slope - bike.angle) * 0.1;
    }

    // UI Güncelleme
    speedText.innerText = Math.floor(Math.abs(bike.vX) * 10);
    
    if (keys['KeyR']) { bike.x = 100; bike.vX = 0; bike.vY = 0; bike.angle = 0; }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // KAMERA TAKİBİ (Dünyayı motorun tersine kaydırıyoruz)
    ctx.save();
    ctx.translate(-bike.x + 200, 0);

    // ARAZİ ÇİZİMİ
    ctx.beginPath();
    ctx.moveTo(physics.groundPoints[0].x, canvas.height);
    for (let p of physics.groundPoints) {
        ctx.lineTo(p.x, p.y);
    }
    ctx.lineTo(physics.groundPoints[physics.groundPoints.length-1].x, canvas.height);
    ctx.fillStyle = "#333";
    ctx.fill();
    ctx.strokeStyle = "#4CAF50"; // Çim çizgisi
    ctx.lineWidth = 4;
    ctx.stroke();

    // MOTOR ÇİZİMİ
    ctx.translate(bike.x, bike.y);
    ctx.rotate(bike.angle);

    // Gövde (Daha ince tasarım)
    ctx.fillStyle = "#e74c3c";
    ctx.fillRect(-30, -5, 60, 10);
    ctx.fillStyle = "#fff";
    ctx.fillRect(-10, -20, 20, 15); // Yakıt deposu alanı

    // Tekerlekler
    ctx.fillStyle = "#111";
    ctx.beginPath(); // Arka
    ctx.arc(-25, bike.suspension, bike.wheelSize, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath(); // Ön
    ctx.arc(25, bike.suspension, bike.wheelSize, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
