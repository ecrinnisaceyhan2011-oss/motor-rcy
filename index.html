<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ultimate Moto Physics Pro</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; touch-action: none; }
        canvas { display: block; }
        /* Mobil Kontroller */
        #ui {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: space-around; pointer-events: none;
        }
        .control-group { display: flex; gap: 20px; pointer-events: auto; }
        .btn {
            width: 80px; height: 80px; background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-family: sans-serif;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: rgba(255,255,255,0.4); transform: scale(0.9); }
        #speedo {
            position: absolute; top: 20px; right: 20px; color: #0f0;
            font-family: 'Courier New', monospace; font-size: 20px;
            background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px;
        }
    </style>
</head>
<body>

<div id="speedo">000 KM/H</div>
