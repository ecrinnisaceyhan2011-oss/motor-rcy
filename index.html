<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Night Rider Pro - V5</title>
    <style>
        body { margin: 0; overflow: hidden; background: #02050a; touch-action: none; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        .stats {
            position: absolute; top: 20px; left: 20px; color: #00d4ff;
            background: rgba(0,10,20,0.8); padding: 12px; border-radius: 8px; border: 1px solid #005577;
        }
        #ui {
            position: absolute; bottom: 40px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box; pointer-events: none;
        }
        .btn {
            width: 80px; height: 80px; background: rgba(0,100,255,0.15);
            border: 2px solid rgba(0,212,255,0.4); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #00d4ff; font-weight: bold; pointer-events: auto; user-select: none;
        }
        .btn:active { background: rgba(0,212,255,0.5); transform: scale(0.9); }
    </style>
</head>
<body>

<div class="stats">
    <div style="font-size: 10px; letter-spacing: 2px;">NIGHT VELOCITY</div>
    <div id="speed" style="font-size: 26px; font-weight: bold; text-shadow: 0 0 10px #00d4ff;">000</div>
</div>

<div id="ui">
    <div style="display: flex; gap: 20px;">
        <div class="btn" id="left">←</div>
        <div class="btn" id="right">→</div>
    </div>
    <div style="display: flex; gap: 20px;">
        <div class="btn" id="brake" style="border-color: #ff3366; color: #ff3366;">FREN</div>
        <div class="btn" id="gas" style="border-color: #00ffaa; color: #00ffaa;">GAZ</div>
    </div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let w, h;
const stars = [];
function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    // Yıldızları bir kez oluştur
    stars.length = 0;
    for(let i=0; i<150; i++) {
        stars.push({ x: Math.random()*w, y: Math.random()*(h*0.6), s: Math.random()*2, o: Math.random() });
    }
}
window.onresize = resize;
resize();

const physics = { gravity: 0.28, friction: 0.985, ground: [] };
for(let i=0; i<4000; i++) {
    physics.ground.push({ x: i*50, y: h*0.78 + Math.sin(i*0.12)*45 + Math.sin(i*0.04)*80 });
}

const p = { x: 200, y: 100, vX: 0, vY: 0, angle: 0, vA: 0 };
const keys = { gas: 0, brake: 0, left: 0, right: 0 };

function bind(id, k) {
    const el = document.getElementById(id);
    const s = (e) => { e.preventDefault(); keys[k] = 1; };
    const e = (e) => { e.preventDefault(); keys[k] = 0; };
    el.onmousedown = el.ontouchstart = s;
    el.onmouseup = el.ontouchend = e;
}
bind('gas','gas'); bind('brake','brake'); bind('left','left'); bind('right','right');

function getH(x) {
    const i = Math.floor(x/50);
    if(i<0) return h;
    const p1 = physics.ground[i], p2 = physics.ground[i+1] || p1;
    return p1.y + ((x-p1.x)/50)*(p2.y-p1.y);
}

function drawBackground() {
    // Gökyüzü Gradient
    let grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, '#02050a');
    grad.addColorStop(1, '#0a1525');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    // Ay
    ctx.fillStyle = '#e1e8f0';
    ctx.shadowBlur = 40; ctx.shadowColor = '#fff';
    ctx.beginPath(); ctx.arc(w - 100, 100, 40, 0, 7); ctx.fill();
    ctx.shadowBlur = 0;

    // Yıldızlar
    stars.forEach(s => {
        ctx.fillStyle = `rgba(255, 255, 255, ${Math.abs(Math.sin(Date.now()*0.001 + s.o))})`; // Parlama efekti
        ctx.fillRect(s.x, s.y, s.s, s.s);
    });
}

function update() {
    if(keys.gas) p.vX += 0.45;
    if(keys.brake) p.vX -= 0.3;
    if(keys.left) p.vA -= 0.006;
    if(keys.right) p.vA += 0.006;

    p.vY += physics.gravity; p.vX *= physics.friction; p.vA *= 0.9;
    p.x += p.vX; p.y += p.vY; p.angle += p.vA;

    const wheels = [p.x - Math.cos(p.angle)*30, p.x + Math.cos(p.angle)*30];
    wheels.forEach((wx, i) => {
        const gy = getH(wx);
        if(p.y + 35 > gy) {
            p.y = gy - 35; p.vY *= 0.1;
            p.vA += (i==0 ? 0.008 : -0.008);
            let slope = Math.atan2(getH(p.x+5) - getH(p.x-5), 10);
            p.angle += (slope - p.angle) * 0.1;
        }
    });
    document.getElementById('speed').innerText = Math.floor(Math.abs(p.vX*7)).toString().padStart(3, '0');
}

function draw() {
    drawBackground();
    ctx.save(); ctx.translate(-p.x + 200, 0);

    // Arazi (Daha karanlık ve neon çizgili)
    ctx.beginPath(); ctx.moveTo(physics.ground[0].x, h);
    physics.ground.forEach(pt => ctx.lineTo(pt.x, pt.y));
    ctx.lineTo(physics.ground[physics.ground.length-1].x, h);
    ctx.fillStyle = '#050505'; ctx.fill();
    ctx.strokeStyle = '#005577'; ctx.lineWidth = 4; ctx.stroke();

    // Motor
    ctx.translate(p.x, p.y); ctx.rotate(p.angle);
    ctx.fillStyle = '#ff3366'; ctx.fillRect(-25, -5, 50, 12); // Gövde
    ctx.fillStyle = '#222'; // Tekerlekler
    ctx.beginPath(); ctx.arc(-25, 20, 18, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(25, 20, 18, 0, 7); ctx.fill();
    ctx.fillStyle = '#33ccff'; ctx.beginPath(); ctx.arc(5, -25, 8, 0, 7); ctx.fill(); // Kask

    ctx.restore();
    update();
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
